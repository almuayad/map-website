<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>موقعي الجغرافي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

h1{
margin-top:20px;
}

#map{
height:500px;
width:90%;
margin:auto;
margin-top:20px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>🌍 موقعي الجغرافي</h1>
<p>مثال لخريطة تفاعلية</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([24.7136,46.6753],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

L.marker([24.7136,46.6753]).addTo(map)
.bindPopup("📍 هذا موقع على الخريطة")
.openPopup();

</script>

</body>
</html>
